# This is your custom MacBook Air 2014 build
name: my-mac-bazzite
description: Bazzite with Broadcom drivers for MacBook Air 2014
# We are using the Bazzite-Deck base (Steam Deck UI)
base-image: ghcr.io/ublue-os/bazzite-deck
image-version: stable
modules:
  - type: rpm-ostree
    install:
      - broadcom-sta-dkms
      - xorg-x11-drv-intel
